version: "3.9"

services:
  # ── FastAPI Backend ───────────────────────────────────────────────────────
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: rag-backend
    ports:
      - "8000:8000"
    environment:
      EMBEDDING_MODEL: "all-MiniLM-L6-v2"
      LLM_MODEL: "mock"               # Set to "gpt-4o-mini" with OPENAI_API_KEY, or a HuggingFace model
      OPENAI_API_KEY: ""              # Optional: add your key here or in .env
      VECTOR_STORE_PATH: "/app/vector_store"
      TOP_K: "5"
    volumes:
      - vector_store:/app/vector_store
      - uploads:/app/uploads
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # ── Streamlit Frontend ────────────────────────────────────────────────────
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: rag-frontend
    ports:
      - "8501:8501"
    environment:
      API_BASE: "http://backend:8000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  vector_store:
  uploads:
